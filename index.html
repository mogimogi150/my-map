<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;}
#map{height:100%;width:100%;}

.searchbox{
  position:absolute;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(255,255,255,0.95);
  padding:12px;
  border-radius:12px;
  width:320px;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}

.searchbox input{
  width:100%;
  font-size:14px;
  padding:8px 10px;
  border:1px solid #ccc;
  border-radius:8px;
}

.results{
  margin-top:8px;
  max-height:220px;
  overflow:auto;
  display:none;
}

.result-item{
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.result-item:hover{
  background:#f2f2f2;
}
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="番号検索 (例: 4020)" />
  <div id="results" class="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat],cat);
});

function makePinIcon(color, emoji, number){
  const id = color.replace("#","");

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="52" height="70" viewBox="0 0 52 70">
    <defs>
      <radialGradient id="grad-${id}" cx="30%" cy="25%" r="80%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
        <stop offset="40%" stop-color="${color}" stop-opacity="1"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
      </radialGradient>

      <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="6" stdDeviation="5" flood-opacity="0.45"/>
      </filter>
    </defs>

    <path d="M26 68S50 46 50 25A24 24 0 1 0 2 25c0 21 24 43 24 43z"
          fill="url(#grad-${id})"
          filter="url(#shadow)"/>

    <ellipse cx="22" cy="18" rx="12" ry="8" fill="white" opacity="0.25"/>
    <circle cx="26" cy="27" r="11" fill="white"/>

    <text x="26" y="31" text-anchor="middle" font-size="15">
      ${emoji}
    </text>

    <text x="26" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
      ${number}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[52,70],
    iconAnchor:[26,68],
    popupAnchor:[0,-65]
  });
}

const iconByCategory = {
  "修理台": "#FF3B30",
  "受注場所": "#000000",
  "武器クラフト": "#FF9500",
  "犯罪クラフト": "#FF7A00",
  "薬素材": "#34C759",
  "精製所": "#FF2D55",
  "売人場所": "#AF52DE"
};

const searchable = [];

function addPoint(p){
  const cat = p.category;
  const color = iconByCategory[cat] || "#8E8E93";

  const marker = L.marker([p.y, p.x], {
    icon: makePinIcon(color,"●",p.title)
  }).bindPopup(`<b>${p.title}</b>`);

  marker.addTo(layers[cat]);

  searchable.push({
    title:p.title,
    marker:marker
  });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint));

const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input",()=>{
  const q = input.value.trim();
  results.innerHTML="";
  if(!q){
    results.style.display="none";
    return;
  }

  const hits = searchable.filter(p=>p.title.includes(q));
  results.style.display="block";

  hits.forEach(p=>{
    const div=document.createElement("div");
    div.className="result-item";
    div.textContent=p.title;
    div.onclick=()=>{
      p.marker.openPopup();
    };
    results.appendChild(div);
  });
});

</script>
</body>
</html>
