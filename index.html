<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;background:#0f141a;}
#map{height:100%;width:100%;}

.searchbox{
  position:absolute; top:12px; left:12px; z-index:9999;
  width:min(340px, calc(100vw - 20px));
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.95);
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}
.searchbox input{
  width:100%; font-size:14px; padding:8px 10px;
  border:1px solid #ccc; border-radius:8px; outline:none;
}
.results{ margin-top:8px; max-height:220px; overflow:auto; display:none; }
.result-item{ padding:6px; cursor:pointer; border-radius:8px; }
.result-item:hover{ background:#f2f2f2; }
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="番号検索 (例: 4020)" />
  <div id="results" class="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{ crs: L.CRS.Simple, minZoom: -2, maxZoom: 4 });
const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// 右側カテゴリ固定
const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};
const categories = ["修理台","受注場所","武器クラフト","犯罪クラフト","薬素材","精製所","売人場所"];
categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat], cat);
});

// カテゴリ色
const colors = {
  "修理台": "#FF3B30",
  "受注場所": "#000000",
  "武器クラフト": "#FF9500",
  "犯罪クラフト": "#FF7A00",
  "薬素材": "#34C759",
  "精製所": "#FF2D55",
  "売人場所": "#AF52DE"
};

// 🔹 最初の涙型ピン + 黒フチ
function makePin(color, number){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="44" height="60" viewBox="0 0 44 60">
    <!-- 本体（黒フチ付き） -->
    <path d="M22 58S40 40 40 22A18 18 0 1 0 4 22c0 18 18 36 18 36z"
          fill="${color}"
          stroke="#000000"
          stroke-width="2"/>

    <!-- 中央白丸 -->
    <circle cx="22" cy="23" r="9"
            fill="white"
            stroke="#000"
            stroke-width="1"/>

    <!-- 番号 -->
    <text x="22" y="27"
          text-anchor="middle"
          font-size="11"
          font-weight="bold"
          fill="#000">
      ${number}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[44,60],
    iconAnchor:[22,58],
    popupAnchor:[0,-50]
  });
}

const searchable = [];

function addPoint(p){
  const cat = p.category;
  const color = colors[cat] || "#8E8E93";

  const marker = L.marker([p.y, p.x], {
    icon: makePin(color, p.title)
  }).bindPopup(`<b>${p.title}</b>`);

  marker.addTo(layers[cat]);

  searchable.push({
    title:p.title,
    marker:marker
  });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint));

// 検索
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input",()=>{
  const q = input.value.trim();
  results.innerHTML="";
  if(!q){
    results.style.display="none";
    return;
  }

  const hits = searchable.filter(p=>p.title.includes(q));
  results.style.display="block";

  hits.forEach(p=>{
    const div=document.createElement("div");
    div.className="result-item";
    div.textContent=p.title;
    div.onclick=()=>{ p.marker.openPopup(); };
    results.appendChild(div);
  });
});

</script>
</body>
</html>
