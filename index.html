<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;background:#111;}
#map{height:100%;width:100%;}

.searchbox{
  position:absolute;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(0,0,0,0.8);
  padding:12px;
  border-radius:12px;
  width:300px;
  color:white;
  box-shadow:0 0 15px rgba(0,255,255,0.4);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}

.searchbox input{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#222;
  color:#0ff;
}

.result-item{
  padding:6px;
  cursor:pointer;
  color:#0ff;
}

.result-item:hover{
  background:#222;
}
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="番号検索 (例: 4020)" />
  <div id="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat],cat);
});

// ネオンカラー
const neonColors = {
  "修理台": "#ff003c",
  "受注場所": "#00ffff",
  "武器クラフト": "#ff8c00",
  "犯罪クラフト": "#ff00ff",
  "薬素材": "#00ff66",
  "精製所": "#ff1493",
  "売人場所": "#8a2be2"
};

function makeNeonIcon(color, number){
  const id = color.replace("#","");

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="56" height="70" viewBox="0 0 56 70">
    <defs>
      <filter id="glow-${id}" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <circle cx="28" cy="28" r="18"
      fill="${color}"
      filter="url(#glow-${id})"/>

    <text x="28" y="33"
      text-anchor="middle"
      font-size="14"
      font-weight="bold"
      fill="#000">
      ${number}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[56,70],
    iconAnchor:[28,28],
    popupAnchor:[0,-20]
  });
}

const searchable = [];

function addPoint(p){
  const cat = p.category;
  const color = neonColors[cat] || "#00ffff";

  const marker = L.marker([p.y, p.x], {
    icon: makeNeonIcon(color, p.title)
  }).bindPopup(`<b>${p.title}</b>`);

  marker.addTo(layers[cat]);

  searchable.push({
    title:p.title,
    marker:marker
  });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint));

const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input",()=>{
  const q = input.value.trim();
  results.innerHTML="";
  if(!q){
    return;
  }

  const hits = searchable.filter(p=>p.title.includes(q));

  hits.forEach(p=>{
    const div=document.createElement("div");
    div.className="result-item";
    div.textContent=p.title;
    div.onclick=()=>{
      p.marker.openPopup();
    };
    results.appendChild(div);
  });
});

</script>
</body>
</html>
