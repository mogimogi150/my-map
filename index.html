<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- おしゃれフォント（日本語OK） -->
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">

<style>
html,body{
  height:100%;
  margin:0;
  background:#e9e3f6; /* くすみ薄紫 */
  font-family:"Zen Kaku Gothic New", system-ui, -apple-system, "Segoe UI", sans-serif;
}
#map{height:100%;width:100%;}

/* ===== 左上：検索UI（少し右へ寄せる） ===== */
.searchbox{
  position:absolute;
  top:12px;
  left:56px;            /* ← 被り回避で右へ */
  z-index:9999;
  width:min(340px, calc(100vw - 80px));
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.88);
  border:2px solid rgba(90,63,154,0.45);
  box-shadow:0 10px 28px rgba(0,0,0,0.18);
  backdrop-filter: blur(6px);
}

.searchbox input{
  width:100%;
  padding:9px 10px;
  border-radius:12px;
  border:1px solid rgba(90,63,154,0.45);
  outline:none;
  font-size:14px;
  background:#faf8ff;
}

.hint{
  font-size:12px;
  color:#4b3f6b;
  margin-top:8px;
  opacity:0.9;
}

.results{
  margin-top:10px;
  max-height:220px;
  overflow:auto;
  display:none;
  border-top:1px solid rgba(90,63,154,0.18);
  padding-top:10px;
}

.result-item{
  padding:8px 8px;
  border-radius:12px;
  cursor:pointer;
  color:#2b2240;
}
.result-item:hover{
  background:rgba(178,157,217,0.18);
}
.result-title{
  font-weight:700;
  font-size:13px;
}
.result-meta{
  font-size:12px;
  opacity:0.85;
  margin-top:2px;
}
.badge{
  display:inline-block;
  margin-left:8px;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(178,157,217,0.25);
  border:1px solid rgba(90,63,154,0.25);
  font-size:11px;
}

/* ===== 右側カテゴリ（薄紫背景 + 上品） ===== */
.leaflet-control-layers{
  background:rgba(233,227,246,0.92); /* ← 薄紫に変更 */
  border-radius:20px;
  padding:16px 16px;
  border:2px solid rgba(90,63,154,0.45);
  box-shadow:0 12px 28px rgba(0,0,0,0.22);
  font-size:16px; /* 少し大きめ */
}

.leaflet-control-layers label{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  font-weight:700;
  color:#2b2240;
}

/* リスト長い時スクロール */
.leaflet-control-layers-overlays{
  max-height:280px;
  overflow:auto;
  padding-right:6px;
}

/* スクロールバー */
.leaflet-control-layers-overlays::-webkit-scrollbar{ width:8px; }
.leaflet-control-layers-overlays::-webkit-scrollbar-thumb{
  background:rgba(90,63,154,0.28);
  border-radius:99px;
}

/* ===== チェックボックスを絵文字化（逆にする） ===== */
.leaflet-control-layers input[type="checkbox"]{
  appearance:none;
  width:24px;
  height:24px;
  cursor:pointer;
  position:relative;
}

/* ⬇️ 外れてる時：💜  （←逆にする） */
.leaflet-control-layers input[type="checkbox"]::before{
  content:"💜";
  font-size:20px;
  position:absolute;
  top:-2px;
  left:0;
}

/* ⬇️ 入ってる時：✅  （←逆にする） */
.leaflet-control-layers input[type="checkbox"]:checked::before{
  content:"✅";
}

/* ===== 左下：ロゴ固定（動かない） ===== */
.logo-fixed{
  position:fixed;
  left:14px;
  bottom:14px;
  z-index:99999;
  pointer-events:none; /* クリック邪魔しない */
}
.logo-fixed img{
  width:min(180px, 32vw);
  height:auto;
  display:block;
  filter: drop-shadow(0 8px 22px rgba(0,0,0,0.45));
  opacity:0.98;
}
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="検索（例：4020 / 修理台 / メモ）" />
  <div class="hint">タイトル（番号）・メモ・カテゴリで検索できます</div>
  <div id="results" class="results"></div>
</div>

<!-- 左下ロゴ（固定） -->
<div class="logo-fixed">
  <img src="./ROGO.png" alt="Gang Logo">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// 画像サイズ（あなたの map.png）
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// カテゴリ切替（右側）
const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};
const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

// 空レイヤーを先に作って登録（=右側に最初から表示）
categories.forEach(cat => {
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat], cat);
});

// ===== ピン（元の涙型 + 黒フチ + 番号） =====
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}

function makePin(color, number){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="44" height="60" viewBox="0 0 44 60">
    <path d="M22 58S40 40 40 22A18 18 0 1 0 4 22c0 18 18 36 18 36z"
          fill="${color}"
          stroke="#000000"
          stroke-width="2"/>
    <circle cx="22" cy="23" r="9"
            fill="white"
            stroke="#000000"
            stroke-width="1"/>
    <text x="22" y="27"
          text-anchor="middle"
          font-size="11"
          font-weight="700"
          fill="#000000">
      ${escapeHtml(number)}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[44,60],
    iconAnchor:[22,58],
    popupAnchor:[0,-50]
  });
}

// カテゴリ色（クロミっぽい紫寄せ）
const colors = {
  "修理台": "#7a6aa6",
  "受注場所": "#1f1a2e",
  "武器クラフト": "#9b7bd6",
  "犯罪クラフト": "#6e4cb8",
  "薬素材": "#8c79b5",
  "精製所": "#5a3f9a",
  "売人場所": "#b29dd9",
  "未分類": "#8E8E93"
};

// 検索用
const searchable = [];

function addPoint(p){
  const cat = p.category || "未分類";
  const title = p.title || "無題";
  const note = p.note || "";

  if(!layers[cat]){
    layers[cat] = L.layerGroup().addTo(map);
    layerControl.addOverlay(layers[cat], cat);
  }

  const color = colors[cat] || colors["未分類"];

  const marker = L.marker([p.y, p.x], { icon: makePin(color, title) })
    .bindPopup(`<b>${escapeHtml(title)}</b><br>${escapeHtml(note)}<br><span class="badge">${escapeHtml(cat)}</span>`);

  marker.addTo(layers[cat]);

  const text = (cat + " " + title + " " + note).toLowerCase();
  searchable.push({ cat, title, note, x:p.x, y:p.y, marker, text });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint));

// クリックで座標表示（必要なら）
map.on('click', (e) => {
  const x = Math.round(e.latlng.lng);
  const y = Math.round(e.latlng.lat);
  L.popup().setLatLng(e.latlng).setContent(`x: ${x}<br>y: ${y}`).openOn(map);
});

// 検索UI
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input", () => {
  const q = input.value.trim().toLowerCase();
  if(!q){
    results.style.display = "none";
    results.innerHTML = "";
    return;
  }

  const hits = searchable.filter(p => p.text.includes(q)).slice(0, 25);
  results.innerHTML = "";
  results.style.display = "block";

  if(hits.length === 0){
    results.innerHTML = `<div class="result-item"><div class="result-title">該当なし</div></div>`;
    return;
  }

  hits.forEach(p => {
    const el = document.createElement("div");
    el.className = "result-item";
    el.innerHTML = `
      <div class="result-title">${escapeHtml(p.title)}<span class="badge">${escapeHtml(p.cat)}</span></div>
      <div class="result-meta">${escapeHtml(p.note || "")}</div>
    `;
    el.onclick = () => {
      map.setView([p.y, p.x], Math.max(map.getZoom(), 1));
      p.marker.openPopup();
      if(layers[p.cat] && !map.hasLayer(layers[p.cat])) layers[p.cat].addTo(map);
    };
    results.appendChild(el);
  });
});
</script>
</body>
</html>
