<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;background:#dcdcdc;}
#map{height:100%;width:100%;}
*{box-sizing:border-box;}
img{display:block;max-width:none;height:auto;}

/* =========================================================
   ここだけ触れば全部調整できる（初期値：整えた）
========================================================= */
:root{
  /* [A] 検索UI */
  --search-left:260px;     /* 右へ+ / 左へ- */
  --search-top:10px;       /* 下へ+ / 上へ- */
  --search-w:520px;        /* 横幅 */
  --search-h:58px;         /* 高さ（見た目） */
  --search-scale:1.00;

  /* 入力欄（画像内の位置） */
  --input-x:0.30;          /* 0〜1：左からの比率 */
  --input-y:0.52;          /* 0〜1：上からの比率（0.5=中央） */
  --input-w:0.56;          /* 0〜1：入力幅の比率 */
  --input-h:36px;
  --input-font:16px;

  /* [B] 右パネル */
  --panel-right:18px;
  --panel-top:90px;
  --panel-w:260px;
  --panel-h:470px;
  --panel-scale:1.00;

  /* パネル中身位置 */
  --cat-left:22px;
  --cat-top:78px;
  --cat-gap:12px;
  --cat-font:16px;

  /* チェックサイズ */
  --check-size:22px;

  /* [C] 左下ロゴ */
  --logo-left:16px;
  --logo-bottom:16px;
  --logo-w:120px;
  --logo-scale:1.00;

  /* [D] ピン（pin.pngが巨大でもここで強制制御） */
  --pin-w:24px;            /* ← ピンの大きさはここだけ */
  --pin-label-top:6px;
  --pin-font:10px;

  /* ピンの刺さる点 微調整（必要なら最後に） */
  --pin-anchor-x:0px;
  --pin-anchor-y:0px;
}

/* =========================
   検索UI（imgタグをやめて背景で表示）
========================= */
.search-ui{
  position:fixed;
  left:var(--search-left);
  top:var(--search-top);
  z-index:9999;
  width:var(--search-w);
  height:var(--search-h);
  transform: scale(var(--search-scale));
  transform-origin:left top;
}
.search-ui .search-bg{
  position:absolute;
  inset:0;
  background:url("./searchbox.png") center/contain no-repeat;
  pointer-events:none;
}
.search-ui input{
  position:absolute;
  left: calc(var(--search-w) * var(--input-x));
  top:  calc(var(--search-h) * var(--input-y));
  transform: translateY(-50%);
  width: calc(var(--search-w) * var(--input-w));
  height: var(--input-h);
  border:none;
  outline:none;
  background:transparent;
  font-size:var(--input-font);
  line-height:var(--input-h);
  padding:0;
}

/* =========================
   右パネル（背景はdiv）
========================= */
.category-panel{
  position:fixed;
  right:var(--panel-right);
  top:var(--panel-top);
  z-index:9998;
  width:var(--panel-w);
  height:var(--panel-h);
  transform: scale(var(--panel-scale));
  transform-origin:right top;
}
.category-panel .panel-bg{
  position:absolute;
  inset:0;
  background:url("./panel-bg.png") center/contain no-repeat;
  pointer-events:none;
}
.cat-items{
  position:absolute;
  top:var(--cat-top);
  left:var(--cat-left);
  font-size:var(--cat-font);
  color:#111;
}
.cat-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:var(--cat-gap);
  cursor:pointer;
  user-select:none;
  height: calc(var(--check-size) + 6px);
}

/* ✅ check-on/off のズレ対策：img切替をやめてdiv背景で固定 */
.chk{
  width:var(--check-size);
  height:var(--check-size);
  flex: 0 0 var(--check-size);
  background:center/contain no-repeat;
}
.chk.on { background-image:url("./check-on.png"); }
.chk.off{ background-image:url("./check-off.png"); }

/* =========================
   ロゴ
========================= */
.fixed-logo{
  position:fixed;
  left:var(--logo-left);
  bottom:var(--logo-bottom);
  z-index:9997;
  transform: scale(var(--logo-scale));
  transform-origin:left bottom;
}
.fixed-logo img{ width:var(--logo-w); height:auto; }

/* =========================
   ピン（pin.pngが巨大でもCSSで強制的に小さく）
========================= */
.leaflet-marker-icon{background:transparent;border:0;}

.pinwrap{
  position:relative;
  width: var(--pin-w);
  transform: translate(
    calc(-50% + var(--pin-anchor-x)),
    calc(-100% + var(--pin-anchor-y))
  );
}
.pinwrap img{
  width: var(--pin-w);     /* ←巨大pin.pngでも必ずこの幅に縮む */
  height:auto;
}
.pinlabel{
  position:absolute;
  top:var(--pin-label-top);
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-weight:700;
  text-shadow:0 2px 6px #000;
  font-size:var(--pin-font);
  line-height:1;
  white-space:nowrap;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="search-ui">
  <div class="search-bg"></div>
  <input id="q" type="text" placeholder="番号検索…">
</div>

<div class="category-panel">
  <div class="panel-bg"></div>
  <div class="cat-items" id="catItems"></div>
</div>

<div class="fixed-logo">
  <img src="./ROGO.png" alt="logo">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* =========================
   Leaflet base
========================= */
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay("./map.png", bounds).addTo(map);
map.fitBounds(bounds, { padding: [40, 40] });

/* =========================
   Categories / Layers
========================= */
const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

const layers = {};
const catItems = document.getElementById("catItems");

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);

  const row = document.createElement("div");
  row.className = "cat-row";

  const check = document.createElement("div");
  check.className = "chk on";

  const label = document.createElement("div");
  label.textContent = cat;

  row.appendChild(check);
  row.appendChild(label);
  catItems.appendChild(row);

  let visible = true;
  row.onclick = () => {
    visible = !visible;
    check.classList.toggle("on", visible);
    check.classList.toggle("off", !visible);
    if (visible) layers[cat].addTo(map);
    else map.removeLayer(layers[cat]);
  };
});

/* =========================
   Pin Icon
   ★ pin.png が巨大でも、CSSの --pin-w で確実に縮む
   ★ Leaflet側の当たり判定も --pin-w に合わせる
========================= */
function getVarNumber(name, fallback){
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
}

function pinIcon(number){
  const w = getVarNumber('--pin-w', 24);

  // 重要：巨大化を避けるため「正方形」で当たり判定を取る（まずこれが安定）
  const h = w;

  return L.divIcon({
    className:"",
    html:`
      <div class="pinwrap">
        <img src="./pin.png" alt="">
        <div class="pinlabel">${number||""}</div>
      </div>
    `,
    iconSize:[w, h],
    iconAnchor:[w/2, h]
  });
}

/* =========================
   Load points
========================= */
fetch("./points.json")
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      const n = (p.number || p.title || "");
      L.marker([p.y, p.x], { icon: pinIcon(n) })
        .addTo(layers[p.category || "修理台"]);
    });
  });
</script>
</body>
</html>
