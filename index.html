<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;background:#dcdcdc;}
#map{height:100%;width:100%;}

/* ===== 調整用 ===== */
:root{
  --search-left:120px;
  --search-top:18px;
  --search-w:560px;

  --input-left:170px;
  --input-top:24px;
  --input-w:330px;
  --input-h:40px;

  --panel-right:20px;
  --panel-top:18px;
  --panel-w:280px;

  --pin-w:65px;

  --logo-left:20px;
  --logo-bottom:20px;
  --logo-w:160px;
}

/* ===== 検索UI ===== */
.search-ui{
  position:fixed;
  left:var(--search-left);
  top:var(--search-top);
  z-index:9999;
}
.search-ui img{
  width:var(--search-w);
  height:auto;
  display:block;
}
.search-ui input{
  position:absolute;
  left:var(--input-left);
  top:var(--input-top);
  width:var(--input-w);
  height:var(--input-h);
  border:none;
  outline:none;
  background:transparent;
  font-size:18px;
}

/* ===== パネル ===== */
.category-panel{
  position:fixed;
  right:var(--panel-right);
  top:var(--panel-top);
  z-index:9998;
}
.category-panel img{
  width:var(--panel-w);
  height:auto;
  display:block;
}
.cat-items{
  position:absolute;
  top:80px;
  left:30px;
  font-size:18px;
}
.cat-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
  cursor:pointer;
}
.cat-row img{
  width:22px;
  height:22px;
}

/* ===== ロゴ ===== */
.fixed-logo{
  position:fixed;
  left:var(--logo-left);
  bottom:var(--logo-bottom);
  z-index:9997;
}
.fixed-logo img{
  width:var(--logo-w);
  height:auto;
}

/* ===== ピン ===== */
.pinwrap{
  position:relative;
  transform:translate(-50%,-100%);
}
.pinwrap img{
  width:var(--pin-w);
  height:auto;
  display:block;
}
.pinlabel{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-weight:bold;
  text-shadow:0 2px 6px #000;
  font-size:16px;
}
</style>
</head>

<body>

<div class="search-ui">
  <img src="./searchbox.png">
  <input id="q" type="text" placeholder="番号検索…">
</div>

<div class="category-panel">
  <img src="./panel-bg.png">
  <div class="cat-items" id="catItems"></div>
</div>

<div class="fixed-logo">
  <img src="./ROGO.png">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay("./map.png", bounds).addTo(map);
map.fitBounds(bounds);

/* ===== カテゴリ ===== */
const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

const layers = {};
const catItems = document.getElementById("catItems");

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);

  const row = document.createElement("div");
  row.className="cat-row";

  const check = document.createElement("img");
  check.src="./check-on.png";

  const label = document.createElement("div");
  label.textContent=cat;

  row.appendChild(check);
  row.appendChild(label);
  catItems.appendChild(row);

  let visible=true;
  row.onclick=()=>{
    visible=!visible;
    check.src=visible?"./check-on.png":"./check-off.png";
    if(visible) layers[cat].addTo(map);
    else map.removeLayer(layers[cat]);
  };
});

/* ===== ピン ===== */
function pinIcon(number){
  return L.divIcon({
    className:"",
    html:`
      <div class="pinwrap">
        <img src="./pin.png">
        <div class="pinlabel">${number||""}</div>
      </div>
    `,
    iconSize:[1,1]
  });
}

/* ===== データ読み込み ===== */
fetch("./points.json")
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      const marker=L.marker([p.y,p.x],{
        icon:pinIcon(p.number||p.title)
      }).addTo(layers[p.category||"修理台"]);
    });
  });

</script>
</body>
</html>
