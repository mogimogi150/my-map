<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  height:100%;
  margin:0;
  background:#0a0f16;
}

#map{
  height:100%;
  width:100%;
}

/* ネオン検索UI */
.searchbox{
  position:absolute;
  top:12px;
  left:12px;
  z-index:9999;
  width:320px;
  padding:14px;
  border-radius:14px;
  background:rgba(10,15,22,0.85);
  border:1px solid rgba(0,255,255,0.25);
  box-shadow:0 0 18px rgba(0,255,255,0.25);
  color:#7ffcff;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  backdrop-filter:blur(6px);
}

.searchbox input{
  width:100%;
  padding:9px;
  border-radius:10px;
  border:1px solid rgba(0,255,255,0.25);
  background:#111;
  color:#00ffff;
  outline:none;
}

.results{
  margin-top:8px;
  max-height:220px;
  overflow:auto;
  display:none;
}

.result-item{
  padding:6px;
  cursor:pointer;
  border-radius:8px;
}

.result-item:hover{
  background:#111;
}
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="番号検索 (例: 4020)" />
  <div id="results" class="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// マップ画像サイズ
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// カテゴリ固定表示
const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat],cat);
});

// ネオンカラー
const neonColors = {
  "修理台": "#ff003c",
  "受注場所": "#00ffff",
  "武器クラフト": "#ff8c00",
  "犯罪クラフト": "#ff00ff",
  "薬素材": "#00ff66",
  "精製所": "#ff1493",
  "売人場所": "#8a2be2"
};

// ネオンピン（3枚目系・控えめ発光）
function makeNeonPin(color, number){

  const id = color.replace("#","");

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="54" height="74" viewBox="0 0 54 74">
    <defs>
      <filter id="glow-${id}" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- 外枠発光 -->
    <path d="M27 72S48 53 48 32A21 21 0 1 0 6 32c0 21 21 40 21 40z"
          fill="none"
          stroke="${color}"
          stroke-width="3"
          filter="url(#glow-${id})"/>

    <!-- 本体 -->
    <path d="M27 70S46 52 46 32A19 19 0 1 0 8 32c0 20 19 38 19 38z"
          fill="#0a0f16"
          stroke="${color}"
          stroke-width="2"/>

    <!-- 中央円 -->
    <circle cx="27" cy="30" r="11"
            fill="#000"
            stroke="${color}"
            stroke-width="2"
            filter="url(#glow-${id})"/>

    <!-- 番号 -->
    <text x="27" y="35"
          text-anchor="middle"
          font-size="13"
          font-weight="bold"
          fill="${color}"
          style="paint-order:stroke; stroke: rgba(0,0,0,0.6); stroke-width:3;">
      ${number}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[54,74],
    iconAnchor:[27,70],
    popupAnchor:[0,-55]
  });
}

const searchable = [];

function addPoint(p){
  const cat = p.category;
  const color = neonColors[cat] || "#00ffff";

  const marker = L.marker([p.y, p.x], {
    icon: makeNeonPin(color, p.title)
  }).bindPopup(`<b>${p.title}</b>`);

  marker.addTo(layers[cat]);

  searchable.push({
    title:p.title,
    marker:marker
  });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint));

// 検索機能
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input",()=>{
  const q = input.value.trim();
  results.innerHTML="";
  if(!q){
    results.style.display="none";
    return;
  }

  const hits = searchable.filter(p=>p.title.includes(q));
  results.style.display="block";

  hits.forEach(p=>{
    const div=document.createElement("div");
    div.className="result-item";
    div.textContent=p.title;
    div.onclick=()=>{
      p.marker.openPopup();
    };
    results.appendChild(div);
  });
});

</script>
</body>
</html>
