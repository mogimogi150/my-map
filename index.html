<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;background:#dcdcdc;}
#map{height:100%;width:100%;}
*{box-sizing:border-box;}
img{display:block;max-width:none;height:auto;}

/* =========================
   調整用（まずここだけ触る）
========================= */
:root{
  /* 検索UI：スクショだと小さすぎ → 大きく */
  --search-left:180px;
  --search-top:14px;
  --search-w:1060px;      /* ←大きく */
  --search-h:372px;       /* ←大きく */

  /* input：比率で配置（画像サイズ変えてもズレにくい） */
  --input-x:0.29;        /* 左からの比率 */
  --input-y:0.52;        /* 上からの比率 */
  --input-w:0.56;        /* 幅の比率 */
  --input-h:44px;

  /* 右パネル */
  --panel-right:20px;
  --panel-top:90px;      /* ←スクショだと上の巨大ピンと干渉してるので下げる */
  --panel-w:300px;
  --panel-h:520px;

  /* パネル中身：スクショでズレてるので調整 */
  --cat-left:26px;
  --cat-top:86px;
  --cat-gap:14px;
  --cat-font:18px;

  /* チェック：固定サイズにしてズレ消す */
  --check-size:26px;

  /* ロゴ */
  --logo-left:20px;
  --logo-bottom:20px;
  --logo-w:150px;

  /* ピン：デカすぎ → 小さく */
  --pin-w:18px;          /* ←ここが最重要 */
  --pin-label-top:8px;
  --pin-font:12px;

  /* ピンの刺さる点 微調整（必要なら） */
  --pin-anchor-x:0px;
  --pin-anchor-y:0px;
}

/* =========================
   検索UI：imgタグを背景化（潰れ/ズレ防止）
========================= */
.search-ui{
  position:fixed;
  left:var(--search-left);
  top:var(--search-top);
  z-index:9999;
  width:var(--search-w);
  height:var(--search-h);
}
.search-ui .search-bg{
  position:absolute;
  inset:0;
  background:url("./searchbox.png") center/contain no-repeat;
  pointer-events:none;
}
.search-ui input{
  position:absolute;
  left: calc(var(--search-w) * var(--input-x));
  top:  calc(var(--search-h) * var(--input-y));
  transform: translateY(-50%);
  width: calc(var(--search-w) * var(--input-w));
  height: var(--input-h);

  border:none;
  outline:none;
  background:transparent;
  font-size:18px;
  line-height: var(--input-h);
  padding:0;
}

/* =========================
   パネル：背景をdiv化＋中身の座標を変数で管理
========================= */
.category-panel{
  position:fixed;
  right:var(--panel-right);
  top:var(--panel-top);
  z-index:9998;
  width:var(--panel-w);
  height:var(--panel-h);
}
.category-panel .panel-bg{
  position:absolute;
  inset:0;
  background:url("./panel-bg.png") center/contain no-repeat;
  pointer-events:none;
}
.cat-items{
  position:absolute;
  top:var(--cat-top);
  left:var(--cat-left);
  font-size:var(--cat-font);
  color:#111;
}

/* 行の高さを固定して“ズレ”を無くす */
.cat-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:var(--cat-gap);
  cursor:pointer;
  user-select:none;
  height: calc(var(--check-size) + 6px);
}

/* ✅ チェックボックスはimgじゃなくdiv背景にする（これでon/offのズレが消える） */
.chk{
  width:var(--check-size);
  height:var(--check-size);
  flex: 0 0 var(--check-size);
  background:center/contain no-repeat;
}
.chk.on { background-image:url("./check-on.png"); }
.chk.off{ background-image:url("./check-off.png"); }

/* =========================
   ロゴ
========================= */
.fixed-logo{
  position:fixed;
  left:var(--logo-left);
  bottom:var(--logo-bottom);
  z-index:9997;
}
.fixed-logo img{
  width:var(--logo-w);
  height:auto;
}

/* =========================
   ピン：見た目＆当たり判定を安定
========================= */
.leaflet-marker-icon{background:transparent;border:0;}

.pinwrap{
  position:relative;
  width: var(--pin-w);
  transform: translate(
    calc(-50% + var(--pin-anchor-x)),
    calc(-100% + var(--pin-anchor-y))
  );
}
.pinwrap img{
  width:var(--pin-w);
  height:auto;
  display:block;
}
.pinlabel{
  position:absolute;
  top:var(--pin-label-top);
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-weight:bold;
  text-shadow:0 2px 6px #000;
  font-size:var(--pin-font);
  line-height:1;
  white-space:nowrap;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="search-ui">
  <div class="search-bg"></div>
  <input id="q" type="text" placeholder="番号検索…">
</div>

<div class="category-panel">
  <div class="panel-bg"></div>
  <div class="cat-items" id="catItems"></div>
</div>

<div class="fixed-logo">
  <img src="./ROGO.png" alt="logo">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay("./map.png", bounds).addTo(map);
map.fitBounds(bounds);

/* ===== カテゴリ ===== */
const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

const layers = {};
const catItems = document.getElementById("catItems");

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);

  const row = document.createElement("div");
  row.className="cat-row";

  // ✅ imgではなくdivにして背景で切替（ズレ消滅）
  const check = document.createElement("div");
  check.className="chk on";

  const label = document.createElement("div");
  label.textContent=cat;

  row.appendChild(check);
  row.appendChild(label);
  catItems.appendChild(row);

  let visible=true;
  row.onclick=()=>{
    visible=!visible;
    check.classList.toggle("on", visible);
    check.classList.toggle("off", !visible);
    if(visible) layers[cat].addTo(map);
    else map.removeLayer(layers[cat]);
  };
});

/* ===== ピン ===== */
function getPinW(){
  const w = getComputedStyle(document.documentElement).getPropertyValue('--pin-w').trim();
  const n = parseFloat(w);
  return Number.isFinite(n) ? n : 38;
}

function pinIcon(number){
  const w = getPinW();

  // pin.png が縦長ならここを w*1.25 などに
  const h = w * 1.25;

  return L.divIcon({
    className:"",
    html:`
      <div class="pinwrap">
        <img src="./pin.png" alt="">
        <div class="pinlabel">${number||""}</div>
      </div>
    `,
    iconSize:[w, h],        // 当たり判定
    iconAnchor:[w/2, h]     // 下端中央が刺さる
  });
}

/* ===== データ読み込み ===== */
fetch("./points.json")
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      L.marker([p.y,p.x],{
        icon:pinIcon(p.number||p.title)
      }).addTo(layers[p.category||"修理台"]);
    });
  });
</script>
</body>
</html>
