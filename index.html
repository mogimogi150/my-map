<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  /* =============================
     🔧 ここだけ触れば調整できる
     ============================= */

  /* 検索枠（画像）の表示位置 */
  --search-left: 110px;   /* ← 右に寄せたいなら増やす */
  --search-top: 1px;     /* ← 下に下げたいなら増やす */
  --search-width: 520px;

  /* 検索入力欄（画像の中のテキスト位置） */
  --input-left: 170px;    /* ← 文字が左すぎ/右すぎなら調整 */
  --input-top: 44px;      /* ← 文字が上すぎ/下すぎなら調整 */
  --input-height: 42px;
  --input-right-pad: 70px; /* 右端の虫眼鏡丸に被らないように */

  /* ピンサイズ（短くする） */
  --pin-width: 56px;
  --pin-height: 64px;     /* ← ここを小さくすると“短く”なる */
  --pin-font: 13px;
  --pin-text-top: 22px;   /* ← 番号の位置（上/下） */

  /* 右パネル */
  --panel-width: 260px;
}

html,body{
  height:100%;
  margin:0;
  background:#e9e3f6;
  font-family:"Zen Kaku Gothic New",system-ui,-apple-system,"Segoe UI",sans-serif;
}

#map{height:100%;width:100%;}

/* ===== 検索UI（画像） ===== */
.search-ui{
  position:absolute;
  top:var(--search-top);
  left:var(--search-left);
  z-index:9999;
  width:var(--search-width);
  pointer-events:none; /* 画像自体はクリック無効 */
}
.search-ui img{
  width:100%;
  height:auto;
  display:block;
  user-select:none;
}

/* 入力欄だけクリックできるようにする */
.search-ui input{
  pointer-events:auto;
  position:absolute;
  left:var(--input-left);
  top:var(--input-top);
  width:calc(100% - var(--input-left) - var(--input-right-pad));
  height:var(--input-height);

  border:none;
  outline:none;
  background:transparent;

  font-size:16px;
  font-weight:700;
  color:#3b1a55;
  text-shadow:0 1px 0 rgba(255,255,255,0.35);
}

.results{
  position:absolute;
  top:calc(var(--search-top) + 96px);
  left:var(--search-left);
  z-index:9999;
  width:calc(var(--search-width) - 20px);

  max-height:240px;
  overflow:auto;
  display:none;

  background:rgba(255,255,255,0.96);
  border-radius:16px;
  padding:10px;
  box-shadow:0 10px 24px rgba(0,0,0,0.18);
}
.result-item{
  padding:8px 10px;
  border-radius:12px;
  cursor:pointer;
}
.result-item:hover{background:#f0e7ff;}

/* ===== ロゴ固定 ===== */
.logo-fixed{
  position:fixed;
  left:14px;
  bottom:14px;
  z-index:99999;
  pointer-events:none;
}
.logo-fixed img{width:160px;height:auto;}

/* Leaflet標準の右カテゴリは非表示 */
.leaflet-control-layers{display:none !important;}

/* ===== 右カテゴリパネル ===== */
.right-panel{
  position:fixed;
  right:14px;
  top:14px;
  z-index:99999;
  width:var(--panel-width);

  background:url('./panel-bg.png') no-repeat center/cover;
  border-radius:18px;
  padding:16px 14px 14px;
  box-shadow:0 12px 28px rgba(0,0,0,0.25);
}

.panel-title{
  font-weight:800;
  font-size:16px;
  color:#2b1743;
  margin:0 0 10px;
  text-align:left;
}

.cat-list{display:flex;flex-direction:column;gap:10px;}

.cat-item{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  user-select:none;
  padding:6px 6px;
  border-radius:12px;
}
.cat-item:hover{background:rgba(255,255,255,0.18);}

.cat-check{
  width:26px;
  height:26px;
  flex:0 0 26px;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
}

.cat-name{
  font-weight:700;
  font-size:15px;
  color:#2b1743;
  text-shadow:0 1px 0 rgba(255,255,255,0.35);
}
</style>
</head>

<body>

<!-- 検索UI（画像＋入力） -->
<div class="search-ui">
  <img src="./searchbox.png" alt="">
  <input id="q" type="text" placeholder="番号検索..." />
</div>
<div id="results" class="results"></div>

<!-- 右カテゴリ -->
<div class="right-panel">
  <div class="panel-title">カテゴリ</div>
  <div id="catList" class="cat-list"></div>
</div>

<!-- ロゴ -->
<div class="logo-fixed"><img src="./ROGO.png" alt=""></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// map.png のサイズ
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// カテゴリ
const categories = [
  "修理台","受注場所","武器クラフト",
  "犯罪クラフト","薬素材","精製所","売人場所"
];

// レイヤー（最初は全部ON）
const layers = {};
categories.forEach(cat => {
  layers[cat] = L.layerGroup().addTo(map);
});

// ===== 画像ピン（比率固定）+番号 =====
function makeImagePin(number){
  const styles = getComputedStyle(document.documentElement);
  const W = parseInt(styles.getPropertyValue('--pin-width'));
  const H = parseInt(styles.getPropertyValue('--pin-height'));
  const FS = styles.getPropertyValue('--pin-font').trim();
  const TOP = styles.getPropertyValue('--pin-text-top').trim();

  const html = `
    <div style="position:relative;width:${W}px;height:${H}px;">
      <img src="./pin.png"
           style="width:100%;height:100%;display:block;object-fit:contain;">
      <div style="
        position:absolute;
        top:${TOP};
        left:0;
        width:100%;
        text-align:center;
        font-weight:800;
        color:#ffffff;
        text-shadow: 0 2px 0 rgba(0,0,0,0.85), 0 0 10px rgba(0,0,0,0.6);
        font-size:${FS};
        letter-spacing:0.5px;
        pointer-events:none;">
        ${number}
      </div>
    </div>`;

  return L.divIcon({
    className:"",
    html,
    iconSize:[W,H],
    iconAnchor:[W/2, H-2],
    popupAnchor:[0, -(H-6)]
  });
}

// ===== points.json 読み込み =====
const searchable = [];
fetch('./points.json')
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      const cat = p.category || "未分類";
      const title = String(p.title || "");
      const marker = L.marker([p.y,p.x],{ icon: makeImagePin(title) })
        .bindPopup(`<b>${title}</b><br>${cat}`);

      if(!layers[cat]){
        layers[cat] = L.layerGroup().addTo(map);
      }
      marker.addTo(layers[cat]);

      searchable.push({ ...p, marker });
    });
  });

// ===== 右パネル：チェック画像でON/OFF =====
const catList = document.getElementById("catList");
const state = {};

function setCheck(el, on){
  el.style.backgroundImage = on
    ? "url('./check-on.png')"
    : "url('./check-off.png')";
}

function renderCats(){
  catList.innerHTML = "";
  categories.forEach(cat=>{
    if(state[cat] === undefined) state[cat] = true;

    const row = document.createElement("div");
    row.className = "cat-item";

    const ck = document.createElement("div");
    ck.className = "cat-check";
    setCheck(ck, state[cat]);

    const name = document.createElement("div");
    name.className = "cat-name";
    name.textContent = cat;

    row.appendChild(ck);
    row.appendChild(name);

    row.onclick = ()=>{
      state[cat] = !state[cat];
      setCheck(ck, state[cat]);

      if(state[cat]) layers[cat].addTo(map);
      else map.removeLayer(layers[cat]);
    };

    catList.appendChild(row);
  });
}
renderCats();

// ===== 検索（番号） =====
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input",()=>{
  const q = input.value.trim();
  if(!q){
    results.style.display="none";
    results.innerHTML="";
    return;
  }

  const hits = searchable.filter(p => String(p.title).includes(q)).slice(0, 30);

  results.innerHTML="";
  results.style.display="block";

  if(hits.length === 0){
    results.innerHTML = `<div class="result-item">該当なし</div>`;
    return;
  }

  hits.forEach(p=>{
    const el = document.createElement("div");
    el.className="result-item";
    el.textContent = `${p.title}（${p.category}）`;
    el.onclick=()=>{
      map.setView([p.y,p.x], Math.max(map.getZoom(), 2));

      // カテゴリがOFFならON
      if(p.category && layers[p.category] && !map.hasLayer(layers[p.category])){
        layers[p.category].addTo(map);
        state[p.category] = true;
        renderCats();
      }

      p.marker.openPopup();
    };
    results.appendChild(el);
  });
});
</script>
</body>
</html>
