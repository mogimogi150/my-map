<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;}
#map{height:100%;width:100%;}
.searchbox{
  position:absolute;top:10px;left:10px;z-index:9999;
  background:rgba(255,255,255,0.95);padding:10px;border-radius:10px;
  width:min(360px,calc(100vw - 20px));
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}
.searchbox input{
  width:100%;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;
}
.searchbox .hint{font-size:12px;color:#555;margin-top:6px;}
.results{margin-top:8px;max-height:220px;overflow:auto;border-top:1px solid #e5e5e5;padding-top:8px;display:none;}
.result-item{padding:8px 6px;border-radius:8px;cursor:pointer;}
.result-item:hover{background:#f2f2f2;}
.result-title{font-weight:600;font-size:13px;}
.result-meta{font-size:12px;color:#666;}
.badge{display:inline-block;padding:2px 6px;border-radius:999px;background:#eee;font-size:11px;margin-left:6px;}
</style>
</head>

<body>
<div class="searchbox">
  <input id="q" type="text" placeholder="検索（例：修理台 / 売人 / 精製）" />
  <div class="hint">タイトル・メモ・カテゴリで検索できます</div>
  <div id="results" class="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// 画像サイズ（あなたの map.png）
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// カテゴリ切替
const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

// ===== アイコン（色＋絵文字） =====
function makePinIcon(color, emoji){
  const safeEmoji = (emoji || "•");
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="36" height="50" viewBox="0 0 36 50">
    <path d="M18 49S34 34 34 19A16 16 0 1 0 2 19c0 15 16 30 16 30z" fill="${color}"/>
    <circle cx="18" cy="19" r="7.6" fill="white" opacity="0.96"/>
    <text x="18" y="22.5" text-anchor="middle" font-size="12.5"
          font-family="system-ui,-apple-system,Segoe UI,Apple Color Emoji,Noto Color Emoji,sans-serif">
      ${safeEmoji}
    </text>
  </svg>`;
  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[36,50],
    iconAnchor:[18,49],
    popupAnchor:[0,-48]
  });
}

// あなた指定の色
const iconByCategory = {
  "修理台": makePinIcon("#FF3B30", "🛠"),        // 赤
  "受注場所": makePinIcon("#000000", "📦"),      // 黒
  "武器クラフト": makePinIcon("#FF9500", "🔫"),  // オレンジ
  "犯罪クラフト": makePinIcon("#FF7A00", "🎭"),  // オレンジ
  "薬素材": makePinIcon("#34C759", "🌿"),        // みどり
  "精製所": makePinIcon("#FF2D55", "🏭"),        // ピンク
  "売人場所": makePinIcon("#AF52DE", "💰"),      // 紫
  "未分類": makePinIcon("#8E8E93", "•")
};

function getIcon(cat){
  return iconByCategory[cat] || makePinIcon("#8E8E93","•");
}

// 検索用
const searchable = [];

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}

function addPoint(p){
  const cat = p.category || "未分類";
  const title = p.title || "無題";
  const note = p.note || "";

  if(!layers[cat]){
    layers[cat] = L.layerGroup();
    layers[cat].addTo(map);
    layerControl.addOverlay(layers[cat], cat);
  }

  const marker = L.marker([p.y, p.x], { icon: getIcon(cat) })
    .bindPopup(`<b>${escapeHtml(title)}</b><br>${escapeHtml(note)}<br><span class="badge">${escapeHtml(cat)}</span>`);

  marker.addTo(layers[cat]);

  const text = (cat + " " + title + " " + note).toLowerCase();
  searchable.push({ cat, title, note, x:p.x, y:p.y, marker, text });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint));

// クリックで座標表示
map.on('click', (e) => {
  const x = Math.round(e.latlng.lng);
  const y = Math.round(e.latlng.lat);
  L.popup().setLatLng(e.latlng).setContent(`x: ${x}<br>y: ${y}`).openOn(map);
});

// 検索UI
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input", () => {
  const q = input.value.trim().toLowerCase();
  if(!q){
    results.style.display = "none";
    results.innerHTML = "";
    return;
  }

  const hits = searchable.filter(p => p.text.includes(q)).slice(0, 20);

  results.innerHTML = "";
  results.style.display = "block";

  if(hits.length === 0){
    results.innerHTML = `<div class="result-item"><div class="result-title">該当なし</div></div>`;
    return;
  }

  hits.forEach(p => {
    const el = document.createElement("div");
    el.className = "result-item";
    el.innerHTML = `
      <div class="result-title">${escapeHtml(p.title)}<span class="badge">${escapeHtml(p.cat)}</span></div>
      <div class="result-meta">${escapeHtml(p.note || "")}</div>
    `;
    el.onclick = () => {
      map.setView([p.y, p.x], Math.max(map.getZoom(), 1));
      p.marker.openPopup();
      if(layers[p.cat] && !map.hasLayer(layers[p.cat])) layers[p.cat].addTo(map);
    };
    results.appendChild(el);
  });
});
</script>
</body>
</html>
