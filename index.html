<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- かわいいフォント -->
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">

<style>
html,body{
  height:100%;
  margin:0;
  background:#ffe6f2;
  font-family:"M PLUS Rounded 1c", sans-serif;
}

#map{
  height:100%;
  width:100%;
}

/* 検索ボックス */
.searchbox{
  position:absolute;
  top:12px;
  left:12px;
  z-index:9999;
  width:320px;
  padding:14px;
  border-radius:20px;
  background:rgba(255,255,255,0.9);
  border:3px solid #ff1493;
  box-shadow:0 0 15px #ff69b4;
}

.searchbox input{
  width:100%;
  padding:8px;
  border-radius:12px;
  border:2px solid #ff1493;
  outline:none;
  font-size:14px;
}

/* ===== 右側カテゴリデザイン ===== */
.leaflet-control-layers{
  background:rgba(255,255,255,0.9);
  border-radius:20px;
  padding:16px;
  border:3px solid #ff1493;
  box-shadow:0 0 20px #ff69b4;
  font-size:16px;
}

/* 各カテゴリ行 */
.leaflet-control-layers label{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  font-weight:700;
  color:#ff1493;
}

/* ハートチェックボックス */
.leaflet-control-layers input[type="checkbox"]{
  appearance:none;
  width:22px;
  height:22px;
  cursor:pointer;
  position:relative;
}

.leaflet-control-layers input[type="checkbox"]::before{
  content:"♡";
  font-size:22px;
  color:#ff1493;
  position:absolute;
  top:-3px;
  left:0;
}

.leaflet-control-layers input[type="checkbox"]:checked::before{
  content:"💖";
  color:#ff1493;
}
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="番号検索 (例: 4020)" />
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat],cat);
});

const colors = {
  "修理台": "#FF3B30",
  "受注場所": "#000000",
  "武器クラフト": "#FF9500",
  "犯罪クラフト": "#FF7A00",
  "薬素材": "#34C759",
  "精製所": "#FF2D55",
  "売人場所": "#AF52DE"
};

function makePin(color, number){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="44" height="60" viewBox="0 0 44 60">
    <path d="M22 58S40 40 40 22A18 18 0 1 0 4 22c0 18 18 36 18 36z"
          fill="${color}"
          stroke="#000"
          stroke-width="2"/>
    <circle cx="22" cy="23" r="9"
            fill="white"
            stroke="#000"
            stroke-width="1"/>
    <text x="22" y="27"
          text-anchor="middle"
          font-size="11"
          font-weight="bold"
          fill="#000">
      ${number}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[44,60],
    iconAnchor:[22,58],
    popupAnchor:[0,-50]
  });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      const color = colors[p.category] || "#8E8E93";
      L.marker([p.y, p.x], {
        icon: makePin(color, p.title)
      }).addTo(layers[p.category]);
    });
  });
</script>

</body>
</html>
