<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- 上品かわいいフォント -->
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@600&display=swap" rel="stylesheet">

<style>
html,body{
  height:100%;
  margin:0;
  background:#e8e3f3; /* くすみラベンダー */
  font-family:"Zen Maru Gothic", sans-serif;
}

#map{
  height:100%;
  width:100%;
}

/* ===== 検索ボックス ===== */
.searchbox{
  position:absolute;
  top:12px;
  left:12px;
  z-index:9999;
  width:320px;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.85);
  border:2px solid #7a6aa6;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.searchbox input{
  width:100%;
  padding:8px;
  border-radius:12px;
  border:1px solid #7a6aa6;
  outline:none;
  font-size:14px;
  background:#f7f5fc;
}

/* ===== 右側カテゴリ（クロミ風） ===== */
.leaflet-control-layers{
  background:rgba(255,255,255,0.88);
  border-radius:20px;
  padding:18px;
  border:2px solid #7a6aa6;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
  font-size:16px;
}

/* 各カテゴリ */
.leaflet-control-layers label{
  display:flex;
  align-items:center;
  gap:10px;
  margin:12px 0;
  font-weight:600;
  color:#4b3f6b;
}

/* ハートチェック（上品仕様） */
.leaflet-control-layers input[type="checkbox"]{
  appearance:none;
  width:22px;
  height:22px;
  cursor:pointer;
  position:relative;
}

.leaflet-control-layers input[type="checkbox"]::before{
  content:"♡";
  font-size:20px;
  color:#7a6aa6;
  position:absolute;
  top:-2px;
  left:0;
}

.leaflet-control-layers input[type="checkbox"]:checked::before{
  content:"💜";
  color:#5a3f9a;
}

/* ===== ピン ===== */
</style>
</head>

<body>

<div class="searchbox">
  <input type="text" placeholder="番号検索 (例: 4020)" />
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat],cat);
});

const colors = {
  "修理台": "#7a6aa6",
  "受注場所": "#4b3f6b",
  "武器クラフト": "#9b7bd6",
  "犯罪クラフト": "#6e4cb8",
  "薬素材": "#8c79b5",
  "精製所": "#5a3f9a",
  "売人場所": "#b29dd9"
};

function makePin(color, number){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="44" height="60" viewBox="0 0 44 60">
    <path d="M22 58S40 40 40 22A18 18 0 1 0 4 22c0 18 18 36 18 36z"
          fill="${color}"
          stroke="#1a1625"
          stroke-width="2"/>
    <circle cx="22" cy="23" r="9"
            fill="#ffffff"
            stroke="#1a1625"
            stroke-width="1"/>
    <text x="22" y="27"
          text-anchor="middle"
          font-size="11"
          font-weight="bold"
          fill="#1a1625">
      ${number}
    </text>
  </svg>`;

  return L.divIcon({
    className:"",
    html: svg,
    iconSize:[44,60],
    iconAnchor:[22,58],
    popupAnchor:[0,-50]
  });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      const color = colors[p.category] || "#7a6aa6";
      L.marker([p.y, p.x], {
        icon: makePin(color, p.title)
      }).addTo(layers[p.category]);
    });
  });

</script>

</body>
</html>
