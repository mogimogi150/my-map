<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --search-width: 520px;

  --pin-width: 58px;
  --pin-height: 78px;
  --pin-font: 13px;
  --pin-text-top: 26px;

  /* 右パネルサイズ */
  --panel-width: 260px;
}

html,body{height:100%;margin:0;background:#e9e3f6;font-family:"Zen Kaku Gothic New",sans-serif;}
#map{height:100%;width:100%;}

/* ===== 検索UI ===== */
.search-ui{
  position:absolute;top:10px;left:70px;z-index:9999;width:var(--search-width);
}
.search-ui img{width:100%;height:auto;display:block;pointer-events:none;user-select:none;}
.search-ui input{
  position:absolute;left:165px;top:38px;width:calc(100% - 210px);height:44px;
  border:none;outline:none;background:transparent;font-size:16px;color:#4b2c6b;
}
.results{
  position:absolute;top:110px;left:70px;z-index:9999;width:calc(var(--search-width) - 20px);
  max-height:240px;overflow:auto;display:none;background:rgba(255,255,255,0.96);
  border-radius:16px;padding:10px;box-shadow:0 10px 24px rgba(0,0,0,0.18);
}
.result-item{padding:8px 10px;border-radius:12px;cursor:pointer;}
.result-item:hover{background:#f0e7ff;}

/* ===== ロゴ固定 ===== */
.logo-fixed{position:fixed;left:14px;bottom:14px;z-index:99999;pointer-events:none;}
.logo-fixed img{width:160px;height:auto;}

/* ===== Leaflet標準の右カテゴリは非表示にする ===== */
.leaflet-control-layers{ display:none !important; }

/* ===== 自作：右カテゴリパネル ===== */
.right-panel{
  position:fixed;
  right:14px;
  top:14px;
  z-index:99999;
  width:var(--panel-width);
  background:url('./panel-bg.png') no-repeat center/cover;
  border-radius:18px;
  padding:16px 14px 14px;
  box-shadow:0 12px 28px rgba(0,0,0,0.25);
}

.panel-title{
  font-weight:800;
  font-size:16px;
  color:#2b1743;
  margin:0 0 10px;
  text-align:left;
}

.cat-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.cat-item{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  user-select:none;
  padding:6px 6px;
  border-radius:12px;
}

.cat-item:hover{
  background:rgba(255,255,255,0.18);
}

.cat-check{
  width:26px;
  height:26px;
  flex:0 0 26px;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
}

.cat-name{
  font-weight:700;
  font-size:15px;
  color:#2b1743;
  text-shadow:0 1px 0 rgba(255,255,255,0.35);
}
</style>
</head>

<body>

<!-- 検索UI -->
<div class="search-ui">
  <img src="./searchbox.png" alt="">
  <input id="q" type="text" placeholder="番号検索..." />
</div>
<div id="results" class="results"></div>

<!-- 自作 右パネル -->
<div class="right-panel">
  <div class="panel-title">カテゴリ</div>
  <div id="catList" class="cat-list"></div>
</div>

<!-- ロゴ -->
<div class="logo-fixed"><img src="./ROGO.png" alt=""></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// 画像サイズ（あなたの map.png）
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// カテゴリ
const categories = [
  "修理台","受注場所","武器クラフト",
  "犯罪クラフト","薬素材","精製所","売人場所"
];

// レイヤー
const layers = {};
categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map); // 最初は全部ON
});

// ===== 画像ピン + 番号 =====
function makeImagePin(number){
  const styles = getComputedStyle(document.documentElement);
  const W = parseInt(styles.getPropertyValue('--pin-width'));
  const H = parseInt(styles.getPropertyValue('--pin-height'));
  const FS = styles.getPropertyValue('--pin-font').trim();
  const TOP = styles.getPropertyValue('--pin-text-top').trim();

  const html = `
    <div style="position:relative;width:${W}px;height:${H}px;">
      <img src="./pin.png" style="width:${W}px;height:${H}px;display:block;">
      <div style="
        position:absolute;
        top:${TOP};
        left:0;
        width:100%;
        text-align:center;
        font-weight:800;
        color:#ffffff;
        text-shadow: 0 2px 0 rgba(0,0,0,0.85), 0 0 10px rgba(0,0,0,0.6);
        font-size:${FS};
        letter-spacing:0.5px;
        pointer-events:none;">
        ${number}
      </div>
    </div>`;

  return L.divIcon({
    className:"",
    html,
    iconSize:[W,H],
    iconAnchor:[W/2, H-2],
    popupAnchor:[0, -(H-6)]
  });
}

// ===== points読み込み =====
const searchable = [];
fetch('./points.json')
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      const cat = p.category || "未分類";
      const title = String(p.title || "");
      const marker = L.marker([p.y,p.x],{ icon: makeImagePin(title) })
        .bindPopup(`<b>${title}</b><br>${cat}`);

      if(!layers[cat]){
        layers[cat] = L.layerGroup().addTo(map);
      }
      marker.addTo(layers[cat]);

      searchable.push({ ...p, marker });
    });
  });

// ===== 自作右パネル：チェックON/OFFを画像で =====
const catList = document.getElementById("catList");
const state = {}; // cat => boolean

function setCheck(el, on){
  el.style.backgroundImage = on
    ? "url('./check-on.png')"
    : "url('./check-off.png')";
}

function renderCats(){
  catList.innerHTML = "";
  categories.forEach(cat=>{
    if(state[cat] === undefined) state[cat] = true; // 初期ON

    const row = document.createElement("div");
    row.className = "cat-item";

    const ck = document.createElement("div");
    ck.className = "cat-check";
    setCheck(ck, state[cat]);

    const name = document.createElement("div");
    name.className = "cat-name";
    name.textContent = cat;

    row.appendChild(ck);
    row.appendChild(name);

    row.onclick = ()=>{
      state[cat] = !state[cat];
      setCheck(ck, state[cat]);

      if(state[cat]){
        layers[cat].addTo(map);
      }else{
        map.removeLayer(layers[cat]);
      }
    };

    catList.appendChild(row);
  });
}
renderCats();

// ===== 検索 =====
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input",()=>{
  const q = input.value.trim();
  if(!q){
    results.style.display="none";
    results.innerHTML="";
    return;
  }
  const hits = searchable.filter(p => String(p.title).includes(q)).slice(0, 30);

  results.innerHTML="";
  results.style.display="block";

  if(hits.length === 0){
    results.innerHTML = `<div class="result-item">該当なし</div>`;
    return;
  }

  hits.forEach(p=>{
    const el = document.createElement("div");
    el.className="result-item";
    el.textContent = `${p.title}（${p.category}）`;
    el.onclick=()=>{
      map.setView([p.y,p.x], Math.max(map.getZoom(), 2));
      // 該当カテゴリがOFFならONにする
      if(p.category && layers[p.category] && !map.hasLayer(layers[p.category])){
        layers[p.category].addTo(map);
        state[p.category] = true;
        renderCats();
      }
      p.marker.openPopup();
    };
    results.appendChild(el);
  });
});
</script>
</body>
</html>
