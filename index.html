<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* =========================
   ✅ ここをいじると必ず動く（位置・サイズ）
   ========================= */
:root{
  /* 検索枠（画像） */
  --search-left: 110px;   /* 右へ=増やす */
  --search-top: 58px;     /* 下へ=増やす */
  --search-width: 360px;  /* 画像の表示幅 */

  /* 検索入力（文字の当たり判定＋入力位置） */
  --input-left: 150px;    /* 文字を右へ=増やす */
  --input-top: 34px;      /* 文字を下へ=増やす */
  --input-height: 44px;
  --input-right-pad: 72px;

  /* 右パネル（カテゴリ枠） */
  --panel-right: 5px;    /* 左へ寄せたい=増やす */
  --panel-top: 14px;      /* 下げたい=増やす */
  --panel-width: 380px;

  /* ピン（画像） */
  --pin-w: 56px;
  --pin-h: 62px;          /* “短くしたい”なら下げる */
  --pin-text-size: 13px;
  --pin-text-top: 16px;   /* 数字の上下位置（下げる=増やす） */

  /* 左下ロゴ */
  --logo-left: 14px;
  --logo-bottom: 14px;
  --logo-width: 150px;
}

html,body{height:100%;margin:0;}
#map{height:100%;width:100%; background:#ddd;}

/* Leafletのズームボタンが上にあるので、検索枠と被る場合の保険 */
.leaflet-top.leaflet-left{ margin-top: 8px; margin-left: 100px; }

/* =========================
   検索UI（画像ベース）
   ========================= */
.searchbox{
  position:absolute;
  left: var(--search-left);
  top: var(--search-top);
  width: var(--search-width);
  aspect-ratio: 3 / 1.3; /* 1536:1024 */
  height: auto;                 /* 検索枠画像の高さに合わせて調整 */
  z-index: 9999;
  pointer-events: none;          /* 画像には触れない */
}
.searchbox .bg{
  position:absolute; inset:0;
  background: url("./searchbox.png") no-repeat center / 100% 100%;
  pointer-events: none;
}
.searchbox input{
  position:absolute;
  left: var(--input-left);
  top: var(--input-top);
  width: calc(100% - var(--input-left) - 18px);
  height: var(--input-height);
  padding: 0 var(--input-right-pad) 0 14px;
  border: none;
  outline: none;
  background: transparent;
  font-size: 18px;
  color:#2b2b2b;
  pointer-events: auto;          /* 入力欄だけ触れる */
}
.searchbox input::placeholder{ color:#666; }

/* 検索結果 */
.results{
  position:absolute;
  left: var(--search-left);
  top: calc(var(--search-top) + 110px);
  width: calc(var(--search-width) - 20px);
  max-height: 260px;
  overflow:auto;
  background: rgba(255,255,255,0.95);
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  display:none;
  z-index: 9999;
  pointer-events: auto;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
}
.result-item{padding:10px 8px;border-radius:12px;cursor:pointer;}
.result-item:hover{background:#f1f1f1;}
.result-title{font-weight:700;font-size:14px;}
.result-meta{font-size:12px;color:#555;margin-top:2px;}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#eee;font-size:11px;margin-left:6px;}

/* =========================
   右カテゴリパネル（画像ベース）
   ========================= */
.right-panel{
  position:absolute;
  right: var(--panel-right);
  top: var(--panel-top);
  width: var(--panel-width);
  height: 360px;
  z-index: 9999;
  background: url("./panel-bg.png") no-repeat center / 100% 100%;
  padding: 18px 18px 18px 22px;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
}
.right-panel h3{
  margin: 8px 0 10px;
  font-size: 16px;
}
.cat-list{ margin: 0; padding: 0; list-style:none; }
.cat-item{
  display:flex;
  align-items:center;
  gap: 10px;
  padding: 8px 6px;
  user-select:none;
}
.cat-item input{ display:none; } /* 本体は隠す */

.cat-check{
  width: 26px; height: 26px;
  flex: 0 0 26px;
  background: url("./check-off.png") no-repeat center / 100% 100%;
}
.cat-item input:checked + .cat-check{
  background-image: url("./check-on.png");
}
.cat-name{ font-size: 14px; font-weight: 700; color:#111; }

/* =========================
   左下ロゴ固定
   ========================= */
.logo-fixed{
  position:absolute;
  left: var(--logo-left);
  bottom: var(--logo-bottom);
  z-index: 9999;
  pointer-events:none;
}
.logo-fixed img{ width: var(--logo-width); height:auto; display:block; }

/* =========================
   ピン（画像 + 数字）
   ========================= */
.pin-wrap{
  position: relative;
  width: var(--pin-w);
  height: var(--pin-h);
}
.pin-wrap img{
  width: 100%;
  height: 100%;
  object-fit: contain; /* 伸び防止 */
  display:block;
}
.pin-num{
  position:absolute;
  left: 50%;
  top: var(--pin-text-top);
  transform: translateX(-50%);
  font-size: var(--pin-text-size);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 6px rgba(0,0,0,0.75);
  letter-spacing: 0.5px;
  pointer-events:none;
}
</style>
</head>

<body>
<!-- 検索 -->
<div class="searchbox">
  <div class="bg"></div>
  <input id="q" type="text" placeholder="番号 検索…" />
</div>
<div id="results" class="results"></div>

<!-- 右カテゴリ -->
<div class="right-panel" id="panel">
  <h3>カテゴリ</h3>
  <ul class="cat-list" id="catList"></ul>
</div>

<!-- 左下ロゴ -->
<div class="logo-fixed">
  <img src="./ROGO.png" alt="logo" />
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== 画像サイズ（map.png）=====
const imgWidth = 1457;
const imgHeight = 2048;

// ===== カテゴリ一覧（右側に常に出す）=====
const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

// ===== Leaflet Map =====
const map = L.map('map',{ crs:L.CRS.Simple, minZoom:-2, maxZoom:4 });
const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

// ===== レイヤー（カテゴリごと）=====
const layers = {};
categories.forEach(cat => layers[cat] = L.layerGroup().addTo(map));

// ===== 右側カテゴリUI（画像チェック）=====
const catList = document.getElementById("catList");
categories.forEach(cat=>{
  const li = document.createElement("li");
  li.className="cat-item";
  li.innerHTML = `
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%;">
      <input type="checkbox" checked data-cat="${cat}">
      <span class="cat-check"></span>
      <span class="cat-name">${cat}</span>
    </label>
  `;
  catList.appendChild(li);

  const cb = li.querySelector("input");
  cb.addEventListener("change", ()=>{
    if(cb.checked) layers[cat].addTo(map);
    else map.removeLayer(layers[cat]);
  });
});

// ===== ピンアイコン（画像 + 数字）=====
function makeImagePin(number){
  const html = `
    <div class="pin-wrap">
      <img src="./pin.png" alt="pin">
      <div class="pin-num">${number ?? ""}</div>
    </div>`;
  return L.divIcon({
    className:"",
    html,
    iconSize:[parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pin-w')),
              parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pin-h'))],
    iconAnchor:[parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pin-w'))/2,
                parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pin-h'))],
    popupAnchor:[0,-50]
  });
}

// ===== 検索 =====
const searchable = [];
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[s]));
}

function addPoint(p){
  const cat = p.category || "未分類";
  const title = p.title || "無題";
  const note = p.note || "";

  if(!layers[cat]){
    layers[cat] = L.layerGroup().addTo(map);
    // 右側UIは categories に入れてるものだけ表示（必要なら増やせる）
  }

  const marker = L.marker([p.y, p.x], { icon: makeImagePin(title) })
    .bindPopup(`<b>${escapeHtml(title)}</b><br>${escapeHtml(note)}<br><span class="badge">${escapeHtml(cat)}</span>`);

  marker.addTo(layers[cat]);

  const text = (title + " " + note + " " + cat).toLowerCase();
  searchable.push({ cat, title, note, x:p.x, y:p.y, marker, text });
}

fetch('./points.json')
  .then(r=>r.json())
  .then(points=>points.forEach(addPoint))
  .catch(()=>{});

// クリックで座標表示
map.on('click', (e)=>{
  const x = Math.round(e.latlng.lng);
  const y = Math.round(e.latlng.lat);
  L.popup().setLatLng(e.latlng).setContent(`x: ${x}<br>y: ${y}`).openOn(map);
});

// 検索UI
const input = document.getElementById("q");
const results = document.getElementById("results");

input.addEventListener("input", ()=>{
  const q = input.value.trim().toLowerCase();
  if(!q){
    results.style.display="none";
    results.innerHTML="";
    return;
  }
  const hits = searchable.filter(p=>p.text.includes(q)).slice(0,20);
  results.innerHTML="";
  results.style.display="block";

  if(hits.length===0){
    results.innerHTML = `<div class="result-item"><div class="result-title">該当なし</div></div>`;
    return;
  }

  hits.forEach(p=>{
    const el = document.createElement("div");
    el.className="result-item";
    el.innerHTML = `
      <div class="result-title">${escapeHtml(p.title)}<span class="badge">${escapeHtml(p.cat)}</span></div>
      <div class="result-meta">${escapeHtml(p.note || "")}</div>
    `;
    el.onclick = ()=>{
      map.setView([p.y,p.x], Math.max(map.getZoom(), 1));
      p.marker.openPopup();
      if(layers[p.cat] && !map.hasLayer(layers[p.cat])) layers[p.cat].addTo(map);
    };
    results.appendChild(el);
  });
});
</script>
</body>
</html>
