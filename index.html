<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;background:#dcdcdc;}
#map{height:100%;width:100%;}
*{box-sizing:border-box;}
img{display:block;max-width:none;height:auto;}

/* =========================================================
   ★ ここだけ触ればOK（全部の「移動/大きさ/高さ」調整）
   ---------------------------------------------------------
   ■ left / top / right / bottom ＝ 位置（左右/上下）
   ■ w / h ＝ 大きさ（幅/高さ）
   ■ x / y ＝ パーツ内の位置（画像の中でどこに置くか）
   ■ scale ＝ 全体を拡大縮小（1.0が標準）
========================================================= */
:root{
  /* =========================
     [A] 検索UI（searchbox.png）
  ========================= */
  --search-left:180px;     /* ←検索UIを右へ(+) 左へ(-) */
  --search-top:14px;       /* ←検索UIを下へ(+) 上へ(-) */
  --search-w:760px;        /* ←検索UIの横幅（大きさ） */
  --search-h:72px;         /* ←検索UIの高さ（見た目） */
  --search-scale:1.00;     /* ←検索UIを全体拡大縮小（1.05とか） */

  /* 検索入力欄（input）を「画像の中のどこに置くか」 */
  --input-x:0.29;          /* ←0〜1：左からの比率。0.30=30% */
  --input-y:0.52;          /* ←0〜1：上からの比率。0.50=真ん中 */
  --input-w:0.56;          /* ←0〜1：検索枠の中での横幅比率 */
  --input-h:44px;          /* ←inputの高さ（文字の見え方も変わる） */
  --input-font:18px;       /* ←文字サイズ */

  /* =========================
     [B] 右パネル（panel-bg.png）
  ========================= */
  --panel-right:20px;      /* ←右パネルを左へ(+) 右へ(-) */
  --panel-top:90px;        /* ←右パネルを下へ(+) 上へ(-) */
  --panel-w:300px;         /* ←右パネルの横幅 */
  --panel-h:520px;         /* ←右パネルの高さ（見た目） */
  --panel-scale:1.00;      /* ←右パネルを全体拡大縮小 */

  /* パネル中の「チェック+文字」の開始位置 */
  --cat-left:26px;         /* ←中身を右へ(+) 左へ(-) */
  --cat-top:86px;          /* ←中身を下へ(+) 上へ(-) */
  --cat-gap:14px;          /* ←行間（大きいほど離れる） */
  --cat-font:18px;         /* ←カテゴリ文字サイズ */

  /* チェックボックスの大きさ（check-on/off） */
  --check-size:26px;       /* ←チェックのサイズ */

  /* =========================
     [C] 左下ロゴ（ROGO.png）
  ========================= */
  --logo-left:20px;        /* ←ロゴを右へ(+) 左へ(-) */
  --logo-bottom:20px;      /* ←ロゴを上へ(+) 下へ(-) */
  --logo-w:150px;          /* ←ロゴの横幅 */
  --logo-scale:1.00;       /* ←ロゴを全体拡大縮小 */

  /* =========================
     [D] ピン（pin.png）
  ========================= */
  --pin-w:38px;            /* ←ピンの横幅（大きさ） */
  --pin-scale:1.00;        /* ←ピン全体拡大縮小（微調整用） */

  /* ピンの「数字」の位置とサイズ */
  --pin-label-top:8px;     /* ←数字を下へ(+) 上へ(-) */
  --pin-font:12px;         /* ←数字サイズ */

  /* ピンが「刺さる点」の微調整（最後に使う） */
  --pin-anchor-x:0px;      /* ←刺さる点を右へ(+) 左へ(-) */
  --pin-anchor-y:0px;      /* ←刺さる点を下へ(+) 上へ(-) */
}

/* =========================
   検索UI（背景はdiv化）
========================= */
.search-ui{
  position:fixed;
  left:var(--search-left);
  top:var(--search-top);
  z-index:9999;

  width:var(--search-w);
  height:var(--search-h);

  transform: scale(var(--search-scale));
  transform-origin: left top; /* 拡大縮小しても左上基準でズレにくい */
}
.search-ui .search-bg{
  position:absolute;
  inset:0;
  background:url("./searchbox.png") center/contain no-repeat;
  pointer-events:none;
}
.search-ui input{
  position:absolute;

  left: calc(var(--search-w) * var(--input-x));
  top:  calc(var(--search-h) * var(--input-y));
  transform: translateY(-50%);

  width: calc(var(--search-w) * var(--input-w));
  height: var(--input-h);

  border:none;
  outline:none;
  background:transparent;
  font-size:var(--input-font);
  line-height: var(--input-h);
  padding:0;
}

/* =========================
   右パネル（背景はdiv化）
========================= */
.category-panel{
  position:fixed;
  right:var(--panel-right);
  top:var(--panel-top);
  z-index:9998;

  width:var(--panel-w);
  height:var(--panel-h);

  transform: scale(var(--panel-scale));
  transform-origin: right top;
}
.category-panel .panel-bg{
  position:absolute;
  inset:0;
  background:url("./panel-bg.png") center/contain no-repeat;
  pointer-events:none;
}
.cat-items{
  position:absolute;
  top:var(--cat-top);
  left:var(--cat-left);
  font-size:var(--cat-font);
  color:#111;
}

/* 行の高さを固定してズレを無くす */
.cat-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:var(--cat-gap);
  cursor:pointer;
  user-select:none;
  height: calc(var(--check-size) + 6px);
}

/* ✅ チェックはdiv背景で切替（on/offでズレない） */
.chk{
  width:var(--check-size);
  height:var(--check-size);
  flex: 0 0 var(--check-size);
  background:center/contain no-repeat;
}
.chk.on { background-image:url("./check-on.png"); }
.chk.off{ background-image:url("./check-off.png"); }

/* =========================
   ロゴ
========================= */
.fixed-logo{
  position:fixed;
  left:var(--logo-left);
  bottom:var(--logo-bottom);
  z-index:9997;

  transform: scale(var(--logo-scale));
  transform-origin: left bottom;
}
.fixed-logo img{
  width:var(--logo-w);
  height:auto;
}

/* =========================
   ピン
========================= */
.leaflet-marker-icon{background:transparent;border:0;}

.pinwrap{
  position:relative;

  /* ピンの見た目サイズ */
  width: calc(var(--pin-w) * var(--pin-scale));

  /* “刺さる点” の微調整込み */
  transform: translate(
    calc(-50% + var(--pin-anchor-x)),
    calc(-100% + var(--pin-anchor-y))
  );
}
.pinwrap img{
  width: calc(var(--pin-w) * var(--pin-scale));
  height:auto;
  display:block;
}
.pinlabel{
  position:absolute;
  top:var(--pin-label-top);
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-weight:bold;
  text-shadow:0 2px 6px #000;
  font-size:var(--pin-font);
  line-height:1;
  white-space:nowrap;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="search-ui">
  <div class="search-bg"></div>
  <input id="q" type="text" placeholder="番号検索…">
</div>

<div class="category-panel">
  <div class="panel-bg"></div>
  <div class="cat-items" id="catItems"></div>
</div>

<div class="fixed-logo">
  <img src="./ROGO.png" alt="logo">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay("./map.png", bounds).addTo(map);
map.fitBounds(bounds);

/* ===== カテゴリ ===== */
const categories = [
  "修理台",
  "受注場所",
  "武器クラフト",
  "犯罪クラフト",
  "薬素材",
  "精製所",
  "売人場所"
];

const layers = {};
const catItems = document.getElementById("catItems");

categories.forEach(cat=>{
  layers[cat] = L.layerGroup().addTo(map);

  const row = document.createElement("div");
  row.className="cat-row";

  const check = document.createElement("div");
  check.className="chk on";

  const label = document.createElement("div");
  label.textContent=cat;

  row.appendChild(check);
  row.appendChild(label);
  catItems.appendChild(row);

  let visible=true;
  row.onclick=()=>{
    visible=!visible;
    check.classList.toggle("on", visible);
    check.classList.toggle("off", !visible);
    if(visible) layers[cat].addTo(map);
    else map.removeLayer(layers[cat]);
  };
});

/* ===== ピン =====
   iconSize/iconAnchor を “実サイズ” に合わせる（当たり判定/位置ズレ防止）
*/
function getVarNumber(name, fallback){
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
}
function pinIcon(number){
  const pinW = getVarNumber('--pin-w', 38) * getVarNumber('--pin-scale', 1.0);
  const pinH = pinW * 1.25; // pin.pngが縦長ならこの倍率を調整（1.15〜1.4）

  return L.divIcon({
    className:"",
    html:`
      <div class="pinwrap">
        <img src="./pin.png" alt="">
        <div class="pinlabel">${number||""}</div>
      </div>
    `,
    iconSize:[pinW, pinH],
    iconAnchor:[pinW/2, pinH]
  });
}

/* ===== データ読み込み ===== */
fetch("./points.json")
  .then(r=>r.json())
  .then(points=>{
    points.forEach(p=>{
      L.marker([p.y,p.x],{
        icon:pinIcon(p.number||p.title)
      }).addTo(layers[p.category||"修理台"]);
    });
  });
</script>
</body>
</html>
