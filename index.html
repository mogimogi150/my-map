<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveM共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">

<style>
html,body{
  height:100%;
  margin:0;
  background:#e9e3f6;
  font-family:"Zen Kaku Gothic New", sans-serif;
}
#map{height:100%;width:100%;}

/* ===== 検索窓を画像化 ===== */
.searchbox{
  position:absolute;
  top:12px;
  left:70px;
  z-index:9999;
  width:600px;
  height:120px;
  background:url('./searchbox.png') no-repeat center/contain;
  display:flex;
  align-items:center;
  padding-left:220px;
  box-sizing:border-box;
}

.searchbox input{
  width:70%;
  height:40px;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  color:#4b2c6b;
}

.results{
  position:absolute;
  top:130px;
  left:80px;
  width:500px;
  max-height:220px;
  overflow:auto;
  display:none;
  background:rgba(255,255,255,0.95);
  border-radius:15px;
  padding:10px;
}

.result-item{
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}
.result-item:hover{
  background:#f0e7ff;
}

/* ===== 右カテゴリ ===== */
.leaflet-control-layers{
  background:rgba(233,227,246,0.95);
  border-radius:20px;
  padding:18px;
  border:2px solid rgba(90,63,154,0.5);
  box-shadow:0 12px 28px rgba(0,0,0,0.2);
  font-size:16px;
}

.leaflet-control-layers input[type="checkbox"]{
  appearance:none;
  width:24px;
  height:24px;
  position:relative;
  cursor:pointer;
}

.leaflet-control-layers input[type="checkbox"]::before{
  content:"💜";
  font-size:20px;
  position:absolute;
  top:-2px;
  left:0;
}

.leaflet-control-layers input[type="checkbox"]:checked::before{
  content:"✅";
}

/* ===== ロゴ固定 ===== */
.logo-fixed{
  position:fixed;
  left:14px;
  bottom:14px;
  z-index:99999;
  pointer-events:none;
}
.logo-fixed img{
  width:160px;
  height:auto;
}
</style>
</head>

<body>

<div class="searchbox">
  <input id="q" type="text" placeholder="番号検索..." />
</div>

<div id="results" class="results"></div>

<div class="logo-fixed">
  <img src="./ROGO.png">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const imgWidth = 1457;
const imgHeight = 2048;

const map = L.map('map',{
  crs: L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
});

const bounds = [[0,0],[imgHeight,imgWidth]];
L.imageOverlay('./map.png', bounds).addTo(map);
map.fitBounds(bounds);

const layerControl = L.control.layers(null,null,{collapsed:false}).addTo(map);
const layers = {};

const categories = [
  "修理台","受注場所","武器クラフト",
  "犯罪クラフト","薬素材","精製所","売人場所"
];

categories.forEach(cat=>{
  layers[cat]=L.layerGroup().addTo(map);
  layerControl.addOverlay(layers[cat],cat);
});

/* ===== 画像ピン使用 ===== */
function makeImagePin(number){
  const html = `
  <div style="position:relative;width:90px;height:130px;">
    <img src="./pin.png" style="width:90px;height:130px;">
    <div style="
      position:absolute;
      top:45px;
      left:0;
      width:100%;
      text-align:center;
      font-weight:bold;
      color:white;
      text-shadow:0 0 6px black;
      font-size:16px;">
      ${number}
    </div>
  </div>`;

  return L.divIcon({
    className:"",
    html:html,
    iconSize:[90,130],
    iconAnchor:[45,120],
    popupAnchor:[0,-110]
  });
}

fetch('./points.json')
.then(r=>r.json())
.then(points=>{
  points.forEach(p=>{
    L.marker([p.y,p.x],{
      icon:makeImagePin(p.title)
    }).addTo(layers[p.category]);
  });
});

/* ===== 検索 ===== */
const input=document.getElementById("q");
const results=document.getElementById("results");
const searchable=[];

fetch('./points.json')
.then(r=>r.json())
.then(points=>{
  points.forEach(p=>{
    searchable.push(p);
  });
});

input.addEventListener("input",()=>{
  const q=input.value.trim();
  if(!q){
    results.style.display="none";
    results.innerHTML="";
    return;
  }
  const hits=searchable.filter(p=>p.title.includes(q));
  results.innerHTML="";
  results.style.display="block";
  hits.forEach(p=>{
    const el=document.createElement("div");
    el.className="result-item";
    el.innerText=p.title;
    el.onclick=()=>{
      map.setView([p.y,p.x],2);
    };
    results.appendChild(el);
  });
});
</script>
</body>
</html>
